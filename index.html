<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARACNE</title>

<style>
body {
    margin: 0;
    background: #121212;
    color: #e6e6e6;
    font-family: Arial, sans-serif;
}

/* ===== BUSCADOR ===== */
.search-bar {
    position: sticky;
    top: 0;
    background: #1f1f1f;
    padding: 10px;
    z-index: 10;
}

.search-bar input {
    width: 100%;
    padding: 10px 15px;
    border-radius: 25px;
    border: none;
    background: #2a2a2a;
    color: #fff;
}

/* ===== GRID ===== */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 12px;
    padding: 12px;
}

/* ===== CARD ===== */
.card {
    background: #1a1a1a;
    border-radius: 10px;
    overflow: hidden;
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.03);
}

.card img {
    width: 100%;
    height: 120px;
    object-fit: cover;
}

.card-content {
    padding: 8px;
}

.card-title {
    font-size: 13px;
    margin: 0;
}

.card-source {
    font-size: 11px;
    color: #aaa;
}

/* ===== CARD GRANDE (spotify / timeline) ===== */
.card-large iframe,
.card-large img {
    width: 100%;
    height: 200px;
    object-fit: cover;
}

/* ===== BOTÓN ===== */
.btn {
    display: inline-block;
    margin-top: 6px;
    padding: 6px 10px;
    border: 1px solid #c000ff;
    font-size: 11px;
    text-decoration: none;
    color: white;
}

.btn:hover {
    background: #c000ff;
}

/* Responsive */
@media (max-width: 600px) {
    .grid {
        grid-template-columns: repeat(2, 1fr);
    }
}
</style>
</head>

<body>

<!-- Barra buscador -->
<div class="search-bar">
    <input type="text" placeholder="Aracne band">
</div>

<!-- GRID -->
<div class="grid">

    <!-- TIMELINE -->
    <div class="card card-large">
        <img src="images/photo_2026-04-25_02-42-32.jpg">
        <div class="card-content">
            <p class="card-title">El Ritual</p>
            <p class="card-source">Historia de la banda</p>
        </div>
    </div>

    <!-- SPOTIFY -->
    <div class="card card-large">
        <iframe src="https://open.spotify.com/embed/artist/0wcTKtWvCYQv81bFrrhhn6"
        frameborder="0"
        allow="autoplay; clipboard-write; encrypted-media; fullscreen">
        </iframe>
        <div class="card-content">
            <p class="card-title">Escuchar en Spotify</p>
            <a class="btn" href="https://open.spotify.com/intl-es/artist/0wcTKtWvCYQv81bFrrhhn6" target="_blank">
                Abrir
            </a>
        </div>
    </div>

    <!-- MERCH -->
    <div class="card">
        <img src="images/merch1.jpg">
        <div class="card-content">
            <p class="card-title">Camiseta ARACNE</p>
            <p class="card-source">Merchandising</p>
            <a class="btn" href="#">Comprar</a>
        </div>
    </div>

    <div class="card">
        <img src="images/merch2.jpg">
        <div class="card-content">
            <p class="card-title">Totebag Aracne</p>
            <p class="card-source">Merchandising</p>
            <a class="btn" href="#">Comprar</a>
        </div>
    </div>
 <div class="card">
        <img src="images/merch2.jpg">
        <div class="card-content">
            <p class="card-title">Púas Aracne</p>
            <p class="card-source">Merchandising</p>
            <a class="btn" href="#">Comprar</a>
        </div>
    </div>
    <!-- CONTENIDO NORMAL -->
    <div class="card">
        <img src="images/Noelia.png">
        <div class="card-content">
            <p class="card-title">Cantante</p>
            <p class="card-source">Noelia</p>
        </div>
    </div>

    <div class="card">
        <img src="images/Mateo.png">
        <div class="card-content">
            <p class="card-title">Batería</p>
            <p class="card-source">Mateo</p>
        </div>
    </div>

    <div class="card">
        <img src="images/Cristian.png">
        <div class="card-content">
            <p class="card-title">Guitarra</p>
            <p class="card-source">Cristian</p>
        </div>
    </div>

    <div class="card">
        <img src="images/Adán.png">
        <div class="card-content">
            <p class="card-title">Bajo</p>
            <p class="card-source">Adán</p>
        </div>
    </div>

</div>

</body>
</html>
