<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARACNE</title>

<style>
body {
    margin: 0;
    background: #050505;
    color: #e6e6e6;
    font-family: 'Orbitron', sans-serif;
    overflow-x: hidden;
}

/* ===== HERO ===== */
header {
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    background: radial-gradient(circle at top, #1a001f, #000 70%);
    position: relative;
}

header::before {
    content: "";
    position: absolute;
    inset: 0;
    background: url('https://www.instagram.com/p/DXL5u9SiFzG/?utm_source=ig_web_copy_link&igsh=NTc4MTIwNjQ2YQ==') center/cover;
    opacity: 0.08;
    filter: blur(2px);
}

h1 {
    font-family: 'Cinzel', serif;
    font-size: 5rem;
    color: #c000ff;
    text-shadow: 0 0 25px #ff00ff;
    z-index: 2;
    animation: glow 3s infinite alternate;
}

@keyframes glow {
    from { text-shadow: 0 0 10px #a000ff; }
    to { text-shadow: 0 0 35px #ff00ff; }
}

.hero-text {
    z-index: 2;
    max-width: 600px;
}

.hero-text p {
    opacity: 0.8;
}

/* ===== BOTONES ===== */
.btns {
    margin-top: 20px;
    z-index: 2;
}

.btns a {
    margin: 10px;
    padding: 12px 22px;
    border: 1px solid #c000ff;
    color: #fff;
    text-decoration: none;
    transition: 0.3s;
    display: inline-block;
}

.btns a:hover {
    background: #c000ff;
    box-shadow: 0 0 15px #ff00ff;
    transform: scale(1.05);
}

/* ===== SECCIONES ===== */
.section {
    padding: 80px 20px;
    text-align: center;
}

.section h2 {
    font-family: 'Cinzel', serif;
    font-size: 2.5rem;
    color: #c000ff;
    margin-bottom: 40px;
}

/* ===== MIEMBROS ===== */
.members {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 25px;
    max-width: 1000px;
    margin: auto;
}

.card {
    background: rgba(26,0,31,0.7);
    padding: 20px;
    border: 1px solid #c000ff;
    transition: 0.4s;
    backdrop-filter: blur(6px);
}

.card:hover {
    transform: translateY(-10px);
    box-shadow: 0 0 20px #c000ff;
}

.card img {
    width: 100%;
    filter: grayscale(100%);
    transition: 0.4s;
}

.card:hover img {
    filter: grayscale(0%);
}

/* ===== TIMELINE ===== */
.timeline img {
    width: 90%;
    max-width: 900px;
    border: 2px solid #c000ff;
    box-shadow: 0 0 25px #c000ff;
}

/* ===== SPOTIFY ===== */
.spotify {
    display: flex;
    justify-content: center;
}

/* ===== FOOTER ===== */
footer {
    padding: 30px;
    text-align: center;
    background: #000;
    border-top: 1px solid #1a001f;
    opacity: 0.7;
}

/* ===== RESPONSIVE ===== */
@media (max-width: 768px) {
    h1 { font-size: 3rem; }
}
</style>
</head>

<body>

<header>
    <div class="hero-text">
        <h1>ARACNE</h1>
        <p>Banda de música
~ Bienvenid@s a la tela de araña 🕷🕸
~ Metal gótico/fantasía oscura 🖤🩷</p>

        <div class="btns">
            <a href="https://open.spotify.com/intl-es/artist/0wcTKtWvCYQv81bFrrhhn6?si=iSgyI57TT-SDxIv1HB2f3A" target="_blank">Spotify</a>
            <a href="https://www.instagram.com/aracnebandoficial/" target="_blank">Instagram</a>
        </div>
    </div>
</header>

<section class="section">
    <h2>MIEMBROS</h2>
    <div class="members">
        <div class="card">
            <img src="images/Noelia.png">
            <h3>Cantante</h3>
        </div>
        
        <div class="card">
            <img src="images/Mateo.png">
            <h3>Batería</h3>
        </div>

        <div class="card">
            <img src="images/Cristian.png">
            <h3>Guitarra</h3>
        </div>

        <div class="card">
            <img src="images/Adán.png">
            <h3>Bajo</h3>
        </div>

        <div class="card">
            <img src="images/Elena.png">
            <h3>Piano</h3>
        </div>

    </div>
</section>

<section class="section timeline">
    <h2>EL RITUAL</h2>
    <img src="file_00000000f1f871f4b55adbade87c6c8e">
</section>

<section class="section">
    <h2>SONIDO</h2>
    <div class="spotify">
        <iframe style="border-radius:12px"
            src="https://open.spotify.com/embed/artist/0wcTKtWvCYQv81bFrrhhn6"
            width="320" height="380"
            frameborder="0"
            allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture">
        </iframe>
    </div>
</section>

<footer>
    <p>ARACNE © 2026 — All rights reserved</p>
</footer>

</body>
</html>
