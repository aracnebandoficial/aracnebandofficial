<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARACNE</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
<style>
body {
    margin: 0;
    background: #0a0a0a;
    color: #e0e0e0;
    font-family: 'Orbitron', sans-serif;
}

header {
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    background: radial-gradient(circle, #1a001f, #000);
    text-align: center;
}

h1 {
    font-family: 'Cinzel', serif;
    font-size: 4rem;
    color: #c000ff;
    text-shadow: 0 0 20px #ff00ff;
}

.btns a {
    margin: 10px;
    padding: 10px 20px;
    border: 1px solid #c000ff;
    color: #fff;
    text-decoration: none;
}

.section {
    padding: 60px 20px;
    text-align: center;
}

.members {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 20px;
}

.card {
    background: #1a001f;
    padding: 20px;
    border: 1px solid #c000ff;
}

.card img {
    width: 100%;
    filter: grayscale(100%);
}

.timeline img {
    width: 90%;
    border: 2px solid #c000ff;
}

footer {
    padding: 20px;
    text-align: center;
    background: #000;
}
</style>
</head>
<body>

<header>
    <h1>ARACNE</h1>
    <p>Darkness is our language</p>
    <div class="btns">
        <a href="#">Spotify</a>
        <a href="#">YouTube</a>
        <a href="#">Instagram</a>
    </div>
</header>

<section class="section">
    <h2>LOS ELEGIDOS</h2>
    <div class="members">
        <div class="card">
            <img src="file_00000000c640724680a7031c379058ef" alt="bateria">
            <h3>Batería</h3>
        </div>
        <div class="card">
            <img src="file_00000000c640724680a7031c379058ef" alt="guitarra">
            <h3>Guitarra</h3>
        </div>
        <div class="card">
            <img src="file_00000000c640724680a7031c379058ef" alt="bajo">
            <h3>Bajo</h3>
        </div>
        <div class="card">
            <img src="file_00000000c640724680a7031c379058ef" alt="piano">
            <h3>Piano</h3>
        </div>
    </div>
</section>

<section class="section timeline">
    <h2>EL RITUAL</h2>
    <img src="file_00000000f1f871f4b55adbade87c6c8e" alt="timeline">
</section>

<section class="section">
    <h2>SONIDO</h2>
    <iframe style="border-radius:12px" src="https://open.spotify.com/embed/track/" width="300" height="80" frameBorder="0"></iframe>
</section>

<footer>
    <p>ARACNE © 2026</p>
</footer>

</body>
</html>
